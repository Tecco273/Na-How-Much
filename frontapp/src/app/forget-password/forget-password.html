<div class="navbar">

  <a href="/"><h2 class="logo">NAhowmuch</h2></a>

  @if(isLoggedIn){

  <div class="profile-menu">

    <button class="profile-btn" (click)="toggleMenu()">
      Profile ▼
    </button>

    @if(showMenu){
    <div class="dropdown">

      <div class="dropdown-item" (click)="goProfile()">
        Profile
      </div>

      <div class="dropdown-item" (click)="logout()">
        Logout
      </div>

    </div>
    }

  </div>

  } @else {

  <button (click)="goLogin()" class="login-btn">
    Login
  </button>

  }

</div>

<div class="forgot-container">

<h2>Forgot Password</h2>

@if(!codeSent){

<label>Email</label>
<input type="email" [(ngModel)]="email">

<button (click)="sendCode()">Send Code</button>

}

@if(codeSent){

<label>Enter Verification Code</label>
<input type="text" [(ngModel)]="code">

<label>New Password</label>
<input type="password" [(ngModel)]="newPassword">

<label>Confirm Password</label>
<input type="password" [(ngModel)]="confirmPassword">

<button (click)="resetPassword()">Reset Password</button>

@if (passwordMismatch) {
    <p class="error">Passwords do not match</p>
    }

}

</div>
