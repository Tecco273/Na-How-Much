<div class="navbar">

  <a href="/"><h2 class="logo">NAhowmuch</h2></a>

  @if(isLoggedIn){

  <div class="profile-menu">

    <button class="profile-btn" (click)="toggleMenu()">
      Profile ▼
    </button>

    @if(showMenu){
    <div class="dropdown">

      <div class="dropdown-item" (click)="goProfile()">
        Profile
      </div>

      <div class="dropdown-item" (click)="logout()">
        Logout
      </div>

    </div>
    }

  </div>

  } @else {

  <button (click)="goLogin()" class="login-btn">
    Login
  </button>

  }

</div>

<div class="profile-container">

<h2>Your Profile</h2>

<div class="profile-info">

<label>First Name</label>
<p>{{user.firstName}}</p>

<label>Last Name</label>
<p>{{user.lastName}}</p>

<label>Email</label>
<input type="text" [(ngModel)]="user.email">

<label>Username</label>
<input type="text" [(ngModel)]="user.username">

<label>Number of Submissions</label>
<p>{{user.submissionNum}}</p>

<button (click)="updateProfile()">Save Changes</button>

</div>

<hr>

<div class="password-section">

<h3>Change Password</h3>

<input
type="password"
[(ngModel)]="oldPassword"
placeholder="old password"
>

<input
type="password"
[(ngModel)]="newPassword"
placeholder="New password"
>

<button (click)="changePassword()">Change Password</button>

</div>

</div>
