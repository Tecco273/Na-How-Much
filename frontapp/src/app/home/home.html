<div class="navbar">

  <a href="/"><h2 class="logo">NAhowmuch</h2></a>

  @if(isLoggedIn){

  <div class="profile-menu">

    <button class="profile-btn" (click)="toggleMenu()">
      Profile ▼
    </button>

    @if(showMenu){
    <div class="dropdown">

      <div class="dropdown-item" (click)="goProfile()">
        Profile
      </div>

      <div class="dropdown-item" (click)="logout()">
        Logout
      </div>

    </div>
    }

  </div>

  } @else {

  <button (click)="goLogin()" class="login-btn">
    Login
  </button>

  }

</div>


<div class="search-section">

  <input
    type="text"
    placeholder="Search product..."
    [(ngModel)]="searchText"
  >

  <select [(ngModel)]="categoryId">
    <option [ngValue]=0>All Categories</option>
    @for(cat of categories; track cat.id){
      <option [ngValue]="cat.id">{{cat.name}}</option>
    }
  </select>

  <button (click)="search()">Search</button>

</div>

<div>
    <button (click)="addSubmission()">Add submission</button>
</div>


<div class="results">

@@for(item of items; track item.id){

<a [routerLink]="['/item-details', item.id]" class="item-link">

  <div class="item-card">

    <img [src]="item.imageUrl">

    <h3>{{item.name}}</h3>

    <p>Avg Price: {{item.avgPrice}} FCFA</p>

  </div>

</a>

}
</div>
