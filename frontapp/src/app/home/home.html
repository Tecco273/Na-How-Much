<div class="navbar">

  <h2 class="logo">NAhowmuch</h2>

  @if(isLoggedIn){

    <button (click)="goProfile()" class="profile-btn">
      Profile
    </button>

  } @else {
  <button (click)="goLogin()" class="login-btn">
    Login
  </button>
  }

</div>


<div class="search-section">

  <input
    type="text"
    placeholder="Search product..."
    [(ngModel)]="searchText"
  >

  <select [(ngModel)]="categoryId">
    <option [ngValue]=0>All Categories</option>
    @for(cat of categories; track cat.id){
      <option [ngValue]="cat.id">{{cat.name}}</option>
    }
  </select>

  <button (click)="search()">Search</button>

</div>

<div>
    <button (click)="addSubmission()">Add submission</button>
</div>


<div class="results">

@for(item of items; track item.id){

  <div class="item-card">

    <img [src]="item.imageUrl">

    <h3>{{item.name}}</h3>

    <p>Avg Price: {{item.avgPrice}} FCFA</p>

  </div>

}
</div>
